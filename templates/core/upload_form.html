{% extends 'base.html' %}
{% load static %}

{% block title %}Upload & Crop | ClarityRx{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<body class="hero-bg">
    <nav class="nav-container">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-lg">
                <i class="fas fa-hand-holding-medical"></i>
            </div>
            <span class="text-xl md:text-2xl font-extrabold tracking-tight text-slate-900">Clarity<span class="text-blue-600">Rx</span></span>
        </div>
    </nav>

    <main class="pt-12 md:pt-20 pb-20 px-6 max-w-4xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Step 1: <span class="text-gradient">Crop Image</span></h1>
            <p class="text-slate-500">Focus on the medicine names and dosages for the best AI results.</p>
        </div>

        <div class="glass-card shadow-2xl border-none">
            <div id="upload-placeholder" class="border-2 border-dashed border-slate-200 rounded-[30px] p-12 text-center cursor-pointer hover:bg-blue-50 transition">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="cursor-pointer">
                    <i class="fas fa-camera text-4xl text-blue-600 mb-4"></i>
                    <p class="text-lg font-bold">Click to capture or upload</p>
                </label>
            </div>

            <div id="cropper-wrapper" class="hidden">
                <div class="max-h-[500px] overflow-hidden rounded-2xl">
                    <img id="image-to-crop" src="" class="max-w-full">
                </div>
                <div class="flex justify-center gap-4 mt-8">
                    <button id="cancel-btn" class="px-6 py-3 bg-slate-200 rounded-full font-bold">Cancel</button>
                    <button id="process-btn" class="btn-winner py-4 px-10">
                        <i class="fas fa-check"></i> Process Cropped Area
                    </button>
                </div>
            </div>
            <div class="text-center mt-8">
            <a href="{% url 'home' %}" class="text-sm font-bold text-slate-500 hover:text-slate-900 transition flex items-center justify-center gap-2">
                <i class="fas fa-chevron-left text-xs"></i> Back to Homepage
            </a>
        </div>
        </div>
    </form>


    <form id="final-form" method="POST" enctype="multipart/form-data" style="display:none;">
        {% csrf_token %}
        <input type="file" name="image" id="blob-input">
    </form>

    <script>
        let cropper;
        const imageInput = document.getElementById('imageInput');
        const imageDisplay = document.getElementById('image-to-crop');
        const placeholder = document.getElementById('upload-placeholder');
        const wrapper = document.getElementById('cropper-wrapper');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageDisplay.src = event.target.result;
                    placeholder.classList.add('hidden');
                    wrapper.classList.remove('hidden');
                    
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageDisplay, {
                        viewMode: 2,
                        movable: true,
                        zoomable: true,
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('process-btn').addEventListener('click', () => {
            const canvas = cropper.getCroppedCanvas();
            canvas.toBlob((blob) => {
                const file = new File([blob], "cropped_rx.jpg", { type: "image/jpeg" });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                
                document.getElementById('blob-input').files = dataTransfer.files;
                document.getElementById('final-form').submit();
            });
        });

        document.getElementById('cancel-btn').addEventListener('click', () => location.reload());
    </script>
</main>
{% endblock %}
